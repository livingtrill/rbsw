<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src  'self';
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    https://fonts.gstatic.com;
  img-src     'self' data: https: blob:;
  connect-src https://coymqpazmzvxanabnhre.supabase.co;
  frame-src   'none';
  object-src  'none';
  base-uri    'self';
  form-action 'self';
">
<title>All Businesses — Real Black Wall Street</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:      #22c55e;
  --green-dim:  rgba(34,197,94,.12);
  --surface-1:  #0a0a0a;
  --surface-2:  #111113;
  --surface-3:  #1a1a1f;
  --surface-4:  #22222a;
  --border:     rgba(255,255,255,.08);
  --border-med: rgba(255,255,255,.14);
  --muted:      rgba(255,255,255,.45);
  --ff-display: 'Space Grotesk', sans-serif;
  --ff-body:    'Inter', sans-serif;
  --t:          0.2s ease;
}

html, body {
  height: 100%;
  background: var(--surface-1);
  color: #fff;
  font-family: var(--ff-body);
  overflow-x: hidden;
}

/* ── NAV ── */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(10,10,10,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--ff-display); font-size: 1.1rem; font-weight: 700;
  color: #fff; text-decoration: none;
}
.nav-logo img { height: 28px; width: auto; }
.btn-back {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  background: transparent; border: 1px solid var(--border-med);
  color: var(--muted); font-size: 0.82rem; font-family: var(--ff-body);
  cursor: pointer; transition: all var(--t);
}
.btn-back:hover { border-color: var(--green); color: var(--green); }
.nav-counter {
  font-size: 0.78rem; color: var(--muted);
  font-family: var(--ff-body);
}

/* ── STAGE ── */
.stage {
  min-height: 100vh;
  padding-top: 58px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 32px;
  padding-bottom: 40px;
}

.stage-heading {
  text-align: center;
  padding-top: 20px;
}
.stage-heading h1 {
  font-family: var(--ff-display); font-size: clamp(1.5rem,3vw,2.2rem);
  font-weight: 700; letter-spacing: -0.02em;
}
.stage-heading h1 em { font-style: normal; color: var(--green); }
.stage-heading p { font-size: 0.875rem; color: var(--muted); margin-top: 6px; }

/* ── CARD STACK ── */
.stack-wrap {
  position: relative;
  width: 340px;
  height: 500px;
}

.biz-card-stack {
  position: absolute;
  inset: 0;
  width: 340px;
  height: 500px;
  border-radius: 20px;
  border: 1px solid var(--border-med);
  background: var(--surface-2);
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
  transition: transform 0.32s cubic-bezier(.22,.68,0,1.2), opacity 0.32s ease;
  will-change: transform;
  user-select: none;
}

.biz-card-stack.is-front  { z-index: 3; cursor: grab; }
.biz-card-stack.is-middle { z-index: 2; pointer-events: none; }
.biz-card-stack.is-back   { z-index: 1; pointer-events: none; }
.biz-card-stack.is-gone   { z-index: 0; pointer-events: none; }
.biz-card-stack.is-front.dragging { cursor: grabbing; transition: none; }

/* position variants */
.biz-card-stack.is-front  { transform: rotate(-5deg) translate(0,0); }
.biz-card-stack.is-middle { transform: rotate(0deg)  translate(40px, 12px); }
.biz-card-stack.is-back   { transform: rotate(5deg)  translate(80px, 24px); }

/* card inner layout */
.card-img {
  width: 100%; height: 200px;
  object-fit: cover; display: block;
  background: var(--surface-3);
  flex-shrink: 0;
}
.card-img-placeholder {
  width: 100%; height: 200px;
  background: var(--surface-3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-img-placeholder img { height: 64px; width: auto; opacity: 0.4; }

.card-body {
  padding: 18px 20px 20px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1;
}
.card-cat-badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 99px;
  background: var(--green-dim); border: 1px solid rgba(34,197,94,.25);
  color: var(--green); font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  width: fit-content;
}
.card-name {
  font-family: var(--ff-display); font-size: 1.2rem; font-weight: 700;
  color: #fff; line-height: 1.2; letter-spacing: -0.01em;
}
.card-loc {
  font-size: 0.78rem; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
}
.card-desc {
  font-size: 0.8rem; color: rgba(255,255,255,.6); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px; border-top: 1px solid var(--border);
  margin-top: auto;
}
.card-meta {
  display: flex; align-items: center; gap: 10px;
}
.card-price {
  font-size: 0.78rem; color: var(--muted); font-weight: 500;
}
.card-rating {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.78rem; color: #f59e0b;
}
.card-btn {
  padding: 6px 14px;
  background: var(--green); color: #000;
  font-size: 0.75rem; font-weight: 700;
  border: none; cursor: pointer; border-radius: 4px;
  font-family: var(--ff-body); text-decoration: none;
  transition: background var(--t);
}
.card-btn:hover { background: #16a34a; }

/* swipe exit animation */
@keyframes swipeLeft  { to { transform: rotate(-25deg) translateX(-140%) translateY(-10%); opacity: 0; } }
@keyframes swipeRight { to { transform: rotate( 25deg) translateX( 140%) translateY(-10%); opacity: 0; } }
.exit-left  { animation: swipeLeft  0.38s ease forwards; }
.exit-right { animation: swipeRight 0.38s ease forwards; }

/* drag ghost */
.drag-hint {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem; color: rgba(255,255,255,.2);
  pointer-events: none;
  transition: opacity 0.3s;
}
.drag-hint.hidden { opacity: 0; }

/* ── CONTROLS ── */
.controls {
  display: flex; align-items: center; gap: 16px;
}
.ctrl-btn {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid var(--border-med);
  background: var(--surface-3);
  color: #fff; font-size: 1.2rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--t);
}
.ctrl-btn:hover { border-color: var(--green); color: var(--green); }
.ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ctrl-label {
  font-size: 0.78rem; color: var(--muted); text-align: center; min-width: 80px;
}

/* ── FILTERS ── */
.filter-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
  max-width: 600px;
}
.filter-pill {
  position: relative; overflow: hidden; isolation: isolate;
  padding: 6px 16px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.1);
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.55);
  font-family: var(--ff-body); cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.filter-pill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.1) 50%, transparent 65%);
  background-size: 200% 100%;
  background-position: 200% 0;
  animation: pill-sweep 3.5s ease infinite;
  pointer-events: none; border-radius: inherit;
}
@keyframes pill-sweep {
  0%   { background-position: 200% 0; }
  35%  { background-position: -100% 0; }
  100% { background-position: -100% 0; }
}
.filter-pill:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.22);
  background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
}
.filter-pill.active {
  color: #fff;
  border-color: rgba(34,197,94,0.55);
  background: linear-gradient(135deg, rgba(34,197,94,0.14) 0%, rgba(34,197,94,0.06) 100%);
}
.filter-pill.active::before {
  background: linear-gradient(110deg, transparent 35%, rgba(34,197,94,0.2) 50%, transparent 65%);
  background-size: 200% 100%;
  animation: pill-sweep-green 3.5s ease infinite;
}
@keyframes pill-sweep-green {
  0%   { background-position: 200% 0; }
  35%  { background-position: -100% 0; }
  100% { background-position: -100% 0; }
}

/* ── LOADING / EMPTY ── */
.state-msg {
  text-align: center; color: var(--muted);
  padding: 40px 20px;
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DONE STATE ── */
.done-card {
  width: 340px; height: 500px;
  border-radius: 20px; border: 1px solid var(--border-med);
  background: var(--surface-2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; text-align: center; padding: 32px;
}
.done-icon { font-size: 3rem; }
.done-card h2 { font-family: var(--ff-display); font-size: 1.3rem; }
.done-card p  { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
.btn-restart {
  margin-top: 8px; padding: 10px 24px;
  background: var(--green); color: #000;
  font-weight: 700; font-size: 0.875rem;
  border: none; border-radius: 6px; cursor: pointer;
  font-family: var(--ff-body); transition: background var(--t);
}
.btn-restart:hover { background: #16a34a; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  /* Nav */
  .top-nav { padding: 0 16px; }
  .nav-logo { font-size: 0.9rem; }
  .nav-logo img { height: 22px; }

  /* Stage */
  .stage { gap: 20px; padding-bottom: 32px; }
  .stage-heading h1 { font-size: clamp(1.25rem, 6vw, 1.75rem); }
  .stage-heading p  { font-size: 0.8rem; }

  /* Filter bar: horizontal scroll */
  .filter-bar {
    flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
    justify-content: flex-start; max-width: 100%;
    padding: 0 16px; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill { flex-shrink: 0; }

  /* Card stack */
  .stack-wrap, .biz-card-stack, .done-card { width: calc(100vw - 48px); max-width: 320px; }
  .biz-card-stack { height: 480px; }
  .biz-card-stack.is-middle { transform: rotate(0deg) translate(20px, 8px); }
  .biz-card-stack.is-back   { transform: rotate(5deg) translate(40px, 16px); }

  /* Controls */
  .ctrl-btn { width: 44px; height: 44px; font-size: 1.1rem; }
}
@media (max-width: 380px) {
  .stack-wrap, .biz-card-stack, .done-card { width: calc(100vw - 32px); }
  .card-name { font-size: 1rem; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="top-nav">
  <a href="index.html" class="nav-logo">
    <img src="https://res.cloudinary.com/dg7zncjcv/image/upload/v1776842338/RBWSLogo_buildings_ywbl6a.png" alt="RBWS">
    Real Black Wall Street
  </a>
  <span class="nav-counter" id="nav-counter"></span>
  <button class="btn-back" id="btn-back">← Back</button>
</nav>

<!-- STAGE -->
<main class="stage">

  <div class="stage-heading">
    <h1>Discover <em>Every Business</em></h1>
    <p>Swipe through verified minority-owned businesses across the country</p>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-pill active" data-cat="">All</button>
    <button class="filter-pill" data-cat="Food &amp; Restaurant">Food</button>
    <button class="filter-pill" data-cat="Fashion &amp; Apparel">Fashion</button>
    <button class="filter-pill" data-cat="Technology">Tech</button>
    <button class="filter-pill" data-cat="Health &amp; Wellness">Health</button>
    <button class="filter-pill" data-cat="Beauty &amp; Personal Care">Beauty</button>
    <button class="filter-pill" data-cat="Art &amp; Creative">Art</button>
    <button class="filter-pill" data-cat="Finance &amp; Legal">Finance</button>
    <button class="filter-pill" data-cat="Digital &amp; Social Media">Digital</button>
  </div>

  <!-- CARD STACK -->
  <div id="stack-container">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Loading businesses…</p>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls" id="controls" style="display:none">
    <button class="ctrl-btn" id="btn-prev" title="Previous">←</button>
    <span class="ctrl-label" id="ctrl-label"></span>
    <button class="ctrl-btn" id="btn-next" title="Next">→</button>
  </div>

</main>

<script src="js/businesses.js" defer></script>
</body>
</html>
